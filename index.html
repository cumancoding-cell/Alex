<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contoh Notifikasi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h2><i class="fas fa-bell"></i> Belajar kondisi</h2>
        
        <div class="input-group">
            <label for="masukkanText">Masukkan Angka:</label>
            <input type="text" id="masukkanText" placeholder="Contoh: 1 Sampai 5">
        </div>
        
        <button id="kondisi" class="btn-cek">
            <i class="fas fa-check-circle"></i> Priksa!
        </button>
        
        <div class="info">
            <p>Coba masukkan angka 1 sampai 5 untuk melihat notifikasi berbeda</p>
        </div>
    </div>

    <div id="notificationContainer" class="notification-container"></div>

    <script src="script.js"></script>
</body>
</html>
